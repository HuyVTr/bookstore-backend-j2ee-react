# Database connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/bookstore
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
# Tắt validation tự động của JPA để tránh lỗi xung đột khi inject Service vào Validator
# (Validation đã được xử lý ở Controller rồi nên không cần thiết ở đây)
spring.jpa.properties.jakarta.persistence.validation.mode=none

# Spring Security OAuth2 (Currently Disabled for JWT - React handles the initial login)
# You will need to set these Client IDs/Secrets in your environment variables for Social Login.
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
# spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
# spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
# spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

# Server error path
# server.error.path=/error

# JWT Configuration
app.jwtSecret=AntigravitySecretKeyForJwtAuthenticationService2026
app.jwtExpirationMs=86400000

# File Upload Location
app.upload.dir=uploads

