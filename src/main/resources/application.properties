# Database connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/Project Bookstore CV
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
# Tắt validation tự động của JPA để tránh lỗi xung đột khi inject Service vào Validator
# (Validation đã được xử lý ở Controller rồi nên không cần thiết ở đây)
spring.jpa.properties.jakarta.persistence.validation.mode=none

# Spring Security OAuth2 (Currently Disabled for JWT - React handles the initial login)
# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=

# Facebook OAuth2 Configuration
spring.security.oauth2.client.registration.facebook.client-id=
spring.security.oauth2.client.registration.facebook.client-secret=

# GitHub OAuth2 Configuration
spring.security.oauth2.client.registration.github.client-id=
spring.security.oauth2.client.registration.github.client-secret=

# Server error path
# server.error.path=/error

# JWT Configuration
app.jwtSecret=AntigravitySecretKeyForJwtAuthenticationService2026
app.jwtExpirationMs=86400000

# File Upload Location
app.upload.dir=uploads

# Multipart properties
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=-1

